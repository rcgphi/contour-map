<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Practical Wisdom Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- React + Babel (no build step needed) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }
    p {
      color: #ccc;
    }
    .controls {
      margin: 20px 0;
    }
    input[type=range] {
      width: 100%;
    }
    .panel {
      background: #111;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    svg {
      width: 100%;
      height: auto;
      background: #000;
      border-radius: 10px;
    }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

function App() {
  const [wisdom, setWisdom] = React.useState(30);

  const width = 700;
  const height = 400;
  const cols = 24;
  const rows = 14;

  function gaussian(x, y, cx, cy, amp, s) {
    return amp * Math.exp(-((x - cx)**2 + (y - cy)**2) / (2 * s * s));
  }

  const terrain = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let x = c / cols;
      let y = r / rows;

      let z = 0.2;
      z += gaussian(x,y,0.2,0.3,0.5,0.15);
      z += gaussian(x,y,0.75,0.25,0.7,0.12);
      z += gaussian(x,y,0.5,0.75,0.3,0.18);
      z -= gaussian(x,y,0.45,0.45,0.3,0.15);

      // compression
      let ruleCompression = 1 - wisdom / 100;
      let binary = z > 0.5 ? 0.9 : 0.1;
      z = binary * ruleCompression + z * (1 - ruleCompression);

      terrain.push({
        x: c * (width/cols),
        y: r * (height/rows),
        z: Math.max(0, Math.min(1, z))
      });
    }
  }

  function color(z) {
    if (wisdom < 20) {
      return z > 0.5 ? "#ef4444" : "#111";
    }
    if (z < 0.2) return "#111";
    if (z < 0.4) return "#333";
    if (z < 0.6) return "#666";
    if (z < 0.8) return "#aaa";
    return "#f59e0b";
  }

  return (
    <div className="container">
      <h1>Rules can draw the line. Wisdom reads the landscape.</h1>
      <p>Move the slider to see how coarse rules flatten reality, while practical wisdom reveals nuance.</p>

      <div className="panel controls">
        <label>Rule Compression ↔ Practical Wisdom ({wisdom}%)</label>
        <input
          type="range"
          min="0"
          max="100"
          value={wisdom}
          onChange={(e) => setWisdom(Number(e.target.value))}
        />
      </div>

      <svg viewBox={`0 0 ${width} ${height}`}>
        {terrain.map((pt, i) => (
          <rect
            key={i}
            x={pt.x}
            y={pt.y}
            width={width/cols}
            height={height/rows}
            fill={color(pt.z)}
          />
        ))}
      </svg>

      <div className="panel">
        {wisdom < 30 && <p><b>Low wisdom:</b> A rulebook reduces everything to permitted vs forbidden.</p>}
        {wisdom >= 30 && wisdom < 70 && <p><b>Mid range:</b> Some nuance appears, but many differences are flattened.</p>}
        {wisdom >= 70 && <p><b>High wisdom:</b> Practical wisdom reveals gradients, tradeoffs, and better vs best responses.</p>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
